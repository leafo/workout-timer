<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#28293D"/>
      <stop offset="100%" stop-color="#181825"/>
    </radialGradient>

    <!-- App Accents (Derived from UI Screenshot) -->
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD166"/>
      <stop offset="100%" stop-color="#FF9500"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>

    <!-- Depth Filters -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- App Icon Base -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />
  
  <!-- Subtle Highlight Border -->
  <rect x="2" y="2" width="508" height="508" rx="110" fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="4"/>

  <!-- Timer Assembly -->
  <g transform="translate(256, 256)">
    <!-- Empty Timer Track -->
    <circle cx="0" cy="0" r="144" fill="none" stroke="#232436" stroke-width="44" filter="url(#innerShadow)"/>

    <!-- Left Arc (Work Interval - Green) -->
    <!-- Starts at 105 degrees, spans roughly 150 degrees -->
    <circle cx="0" cy="0" r="144" fill="none" stroke="url(#greenGrad)" stroke-width="44" stroke-linecap="round" stroke-dasharray="377 905" transform="rotate(105)" filter="url(#shadow)"/>

    <!-- Right Arc (Rest Interval - Orange) -->
    <!-- Starts at -75 degrees (285 degrees), spans roughly 150 degrees -->
    <circle cx="0" cy="0" r="144" fill="none" stroke="url(#orangeGrad)" stroke-width="44" stroke-linecap="round" stroke-dasharray="377 905" transform="rotate(-75)" filter="url(#shadow)"/>

    <!-- Center Play Icon (Action - Cyan) -->
    <!-- Visually centered triangle with rounded corners -->
    <path d="M -16 -30 L -16 30 L 36 0 Z" fill="url(#cyanGrad)" stroke="url(#cyanGrad)" stroke-width="14" stroke-linejoin="round" filter="url(#shadow)"/>
  </g>
</svg>
